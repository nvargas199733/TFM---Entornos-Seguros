spring.application.name=entornos-seguros-backend

# ==================== DATABASE ====================
spring.datasource.url=jdbc:postgresql://localhost:5432/entornos_seguros_db
spring.datasource.username=entornos_user
spring.datasource.password=TuContrasenaSegura123!
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA/HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false

# ==================== FLYWAY ====================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

# ==================== SERVER ====================
server.port=8080
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always

# ==================== JWT ====================
app.jwt.secret=tu-secreto-jwt-super-seguro-cambiar-en-produccion
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ==================== CORS ====================
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.max-age=3600

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.com.entornosseguros=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== GOOGLE MAPS ====================
app.google.maps.api-key=${GOOGLE_MAPS_API_KEY:tu-api-key-aqui}

# ==================== EMAIL ====================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:tu-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu-contraseña-app}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==================== REDIS ====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ==================== JACKSON ====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.locale=es_CO

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
