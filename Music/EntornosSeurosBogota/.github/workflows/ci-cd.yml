name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: entornos_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: entornos_seguros_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build Backend with Maven
      run: |
        cd backend
        mvn clean package -DskipTests
    
    - name: Run Backend Tests
      run: |
        cd backend
        mvn test --no-transfer-progress
    
    - name: Build Frontend with Maven
      run: |
        cd frontend
        mvn clean package -DskipTests
    
    - name: Run Frontend Tests
      run: |
        cd frontend
        mvn test --no-transfer-progress
    
    - name: Build Docker Image - Backend
      run: |
        cd backend
        docker build -t entornos-seguros-api:latest .
    
    - name: Build Docker Image - Frontend
      run: |
        cd frontend
        docker build -t entornos-seguros-app:latest .
    
    - name: Run SonarQube Analysis (if configured)
      run: |
        echo "SonarQube analysis would run here"
    
    - name: Upload Coverage Report
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/target/coverage/report.xml
    
    - name: Notify on Success
      if: success()
      run: echo "✅ Build successful!"
    
    - name: Notify on Failure
      if: failure()
      run: echo "❌ Build failed!"
